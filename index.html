<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>A Special Question For You</title>
    <style>
        * { box-sizing: border-box; margin: 0; padding: 0; font-family: sans-serif; }
        body { background: linear-gradient(135deg, #ffe5ec, #ffb3c6); min-height: 100vh; display: flex; justify-content: center; align-items: center; padding: 20px; overflow: hidden; }
        .card { background: white; padding: 30px; border-radius: 20px; box-shadow: 0 10px 30px rgba(0,0,0,0.1); text-align: center; max-width: 400px; width: 100%; position: relative; }
        h2 { color: #ff4d6d; margin-bottom: 25px; font-size: 1.6rem; }
        .btn-container { display: flex; justify-content: center; gap: 20px; margin-top: 20px; min-height: 60px; position: relative; }
        button { padding: 12px 28px; font-size: 1.1rem; border: none; border-radius: 50px; cursor: pointer; font-weight: bold; }
        .btn-yes { background-color: #38b000; color: white; }
        .btn-no { background-color: #ff4d6d; color: white; position: absolute; transition: all 0.2s ease; z-index: 10; }
        .options-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 15px; margin-top: 10px; }
        .btn-option { background-color: #fff0f3; color: #ff4d6d; border: 2px solid #ffb3c6; border-radius: 15px; padding: 15px; font-size: 1rem; }
        .hidden { display: none !important; }
    </style>
</head>
<body>
    <div id="screen-proposal" class="card">
        <h2>Will you go on a date with me? 🌹</h2>
        <div class="btn-container">
            <button class="btn-yes" onclick="nextScreen('activity')">Yes</button>
            <button class="btn-no" id="no-button" onmouseover="moveNoButton()" onclick="moveNoButton()">No</button>
        </div>
    </div>
    <div id="screen-activity" class="card hidden">
        <h2>What would you prefer to do? ✨</h2>
        <div class="options-grid">
            <button class="btn-option" onclick="selectOption('activity','Movie')">🎬 Movie</button>
            <button class="btn-option" onclick="selectOption('activity','Café')">☕ Café</button>
            <button class="btn-option" onclick="selectOption('activity','Drinks')">🍹 Drinks</button>
            <button class="btn-option" onclick="selectOption('activity','Lunch')">🍱 Lunch</button>
        </div>
    </div>
    <div id="screen-time" class="card hidden">
        <h2>Which time works best? ⏰</h2>
        <div class="options-grid">
            <button class="btn-option" onclick="selectOption('time','Morning')">🌅 Morning</button>
            <button class="btn-option" onclick="selectOption('time','Afternoon')">☀️ Afternoon</button>
            <button class="btn-option" onclick="selectOption('time','Evening')">🌙 Evening</button>
        </div>
    </div>
    <div id="screen-day" class="card hidden">
        <h2>Which day are you free? 📅</h2>
        <form action="https://formspree.io" method="POST" id="dateForm">
            <input type="hidden" name="Response" value="Yes! Going on a date!">
            <input type="hidden" name="Activity" id="input-activity">
            <input type="hidden" name="Time" id="input-time">
            <input type="hidden" name="Day" id="input-day">
            <div class="options-grid">
                <button type="button" class="btn-option" onclick="submitData('Sunday')">Sunday</button>
                <button type="button" class="btn-option" onclick="submitData('Monday')">Monday</button>
                <button type="button" class="btn-option" onclick="submitData('Tuesday')">Tuesday</button>
                <button type="button" class="btn-option" onclick="submitData('Wednesday')">Wednesday</button>
                <button type="button" class="btn-option" onclick="submitData('Thursday')">Thursday</button>
                <button type="button" class="btn-option" onclick="submitData('Friday')">Friday</button>
                <button type="button" class="btn-option" onclick="submitData('Saturday')">Saturday</button>
            </div>
        </form>
    </div>
    <script>
        function moveNoButton() {
            const noBtn = document.getElementById('no-button');
            const maxX = window.innerWidth < 500 ? 60 : 150;
            const maxY = window.innerWidth < 500 ? 80 : 120;
            const randomX = (Math.random() - 0.5) * maxX * 2;
            const randomY = (Math.random() - 0.5) * maxY * 2;
            noBtn.style.transform = `translate(${randomX}px, ${randomY}px)`;
        }
        function nextScreen(screenType) {
            document.getElementById('screen-proposal').classList.add('hidden');
            document.getElementById('screen-activity').classList.add('hidden');
            document.getElementById('screen-time').classList.add('hidden');
            document.getElementById('screen-day').classList.add('hidden');
            document.getElementById('screen-' + screenType).classList.remove('hidden');
        }
        function selectOption(key, value) {
            document.getElementById('input-' + key).value = value;
            if (key === 'activity') { nextScreen('time'); }
            else if (key === 'time') { nextScreen('day'); }
        }
        function submitData(selectedDay) {
            document.getElementById('input-day').value = selectedDay;
            document.getElementById('dateForm').submit();
        }
    </script>
</body>
</html>
